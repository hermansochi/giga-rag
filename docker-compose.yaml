version: '3.9'

services:
  traefik:
    image: traefik:v2.11
    container_name: traefik
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --entrypoints.http.address=:80
      - --log.level=INFO
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.traefik.entrypoints=http"
      - "traefik.http.routers.traefik.service=api@internal"

  # Основное приложение (Streamlit)
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: streamlit
    restart: unless-stopped
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    networks:
      - traefik-net
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      - PYTHONUNBUFFERED=1
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.app.rule=Host(`app.localhost`)"
      - "traefik.http.routers.app.entrypoints=http"
      - "traefik.http.services.app.loadbalancer.server.port=8501"

  # PostgreSQL + pgvector
  db:
    image: pgvector/pgvector:pg16
    container_name: postgres_vector
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - traefik-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.minio-api.rule=Host(`s3.localhost`)"
      - "traefik.http.routers.minio-api.entrypoints=http"
      - "traefik.http.services.minio-api.loadbalancer.server.port=9000"

      - "traefik.http.routers.minio-console.rule=Host(`minio.localhost`)"
      - "traefik.http.routers.minio-console.entrypoints=http"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"

  # pgAdmin (опционально)
  # pgAdmin
  pgadmin:
    image: dpage/pgadmin4:9.3
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      
      # Основной роутер
      - "traefik.http.routers.pgadmin.rule=Host(`pgadmin.localhost`)"
      - "traefik.http.routers.pgadmin.entrypoints=http"
      
      # Важно для WebSockets!
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"
      
      # Разрешаем WebSockets и нужные заголовки
      - "traefik.http.routers.pgadmin.middlewares=pgadmin-headers"
      - "traefik.http.middlewares.pgadmin-headers.headers.customrequestheaders.X-Forwarded-Proto=http"
      - "traefik.http.middlewares.pgadmin-headers.headers.customrequestheaders.X-Forwarded-Host=pgadmin.localhost"
      - "traefik.http.middlewares.pgadmin-headers.headers.customresponseheaders.Access-Control-Allow-Origin=*"
      - "traefik.http.middlewares.pgadmin-headers.headers.customresponseheaders.Access-Control-Allow-Methods=GET,POST,OPTIONS"
      - "traefik.http.middlewares.pgadmin-headers.headers.customresponseheaders.Access-Control-Allow-Headers=*"

volumes:
  postgres_data:
  pgadmin_data:
  minio_data:

networks:
  traefik-net:
    name: traefik-net